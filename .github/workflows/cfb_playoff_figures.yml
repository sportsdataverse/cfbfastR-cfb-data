name: CFB Playoff Net-Stats Figures

# Renders the CFP net-stats + bubble gt tables (playoff.R) to ./figures and
# uploads them as a build artifact. Manual / on-demand: this is a figure
# generator (no Bluesky posting), typically run during CFP selection weeks.
# Reads the team-summaries data from the sportsdataverse-data release
# (tag espn_cfb_team_summaries) published by the daily pipeline
# (daily_cfb.yml -> R/espn_cfb_15_team_summaries_creation.R).

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  playoff_figures:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::cli
            any::dplyr
            any::glue
            any::gt
            any::gtExtras
            any::lubridate
            any::magick
            any::readr
            any::stringr
            any::webshot2
            github::andreweatherman/cbbplotR

      - name: Render playoff net-stats figures
        run: Rscript R/presentation/playoff.R

      - uses: actions/upload-artifact@v4
        with:
          name: cfb-playoff-figures
          path: figures/
          if-no-files-found: warn
