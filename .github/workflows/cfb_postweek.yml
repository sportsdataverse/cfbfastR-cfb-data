name: Skeet Post-Week Content

# Builds the weekly "Binion Box Score" gt tables and posts them to Bluesky.
# Reads the team-summaries data from the sportsdataverse-data release
# (tag espn_cfb_team_summaries) that the daily pipeline
# (daily_cfb.yml -> R/espn_cfb_15_team_summaries_creation.R) publishes, so no
# re-aggregation happens here. The daily cron runs at 11:00 UTC, before this
# job's 15:00 UTC slot, so the published season table is fresh.

on:
  schedule:
    - cron: "0 15 * 8-12 1" # 10am ET every Monday, August through December
  workflow_dispatch:

permissions:
  contents: read

jobs:
  postweek:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::bskyr
            any::cfbfastR
            any::cfbplotR
            any::cli
            any::dplyr
            any::ggplot2
            any::glue
            any::gt
            any::gtExtras
            any::lubridate
            any::magick
            any::purrr
            any::readr
            any::stringr
            github::andreweatherman/cbbplotR

      - name: Post-week tables + skeets
        env:
          CFBD_API_KEY: ${{ secrets.CFBD_API_KEY }}
          BLUESKY_APP_USER: ${{ secrets.BLUESKY_APP_USER }}
          BLUESKY_APP_PASS: ${{ secrets.BLUESKY_APP_PASS }}
          SKEET_ENVIRONMENT: prod
        run: Rscript R/presentation/postweek.R
