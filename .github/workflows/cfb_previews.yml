name: Skeet Game Previews

concurrency: "1"

# Builds per-matchup preview gt tables for upcoming ranked / featured games and
# posts them to Bluesky. Reads the team-summaries data from the
# sportsdataverse-data release (tag espn_cfb_team_summaries) published by the
# daily pipeline (daily_cfb.yml -> R/espn_cfb_15_team_summaries_creation.R);
# no re-aggregation here.

on:
  schedule:
    - cron: "0 14 * 9-11 6"    # 10am ET Sat, Sept-Nov (normal slate)
    - cron: "0 22 * 9-11 1-5"  # 6pm ET weekdays, Sept-Nov (MACtion / ACC / Black Friday)
    - cron: "0 14 * 12 *"      # 10am ET daily in December (bowls)
    - cron: "0 14 1-20 1 *"    # 10am ET daily Jan 1-20 (playoff)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  previews:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::bskyr
            any::cfbfastR
            any::cli
            any::dplyr
            any::fs
            any::glue
            any::gt
            any::gtExtras
            any::httr2
            any::lubridate
            any::magick
            any::purrr
            any::readr
            any::scales
            any::stringi
            any::stringr
            any::tidyr
            any::webshot2

      - name: Game previews + skeets
        env:
          CFBD_API_KEY: ${{ secrets.CFBD_API_KEY }}
          BLUESKY_APP_USER: ${{ secrets.BLUESKY_APP_USER }}
          BLUESKY_APP_PASS: ${{ secrets.BLUESKY_APP_PASS }}
          SKEET_ENVIRONMENT: prod
        run: Rscript R/presentation/previews.R
