name: Update CFB Data

on:
  schedule:
    - cron: '0 11 * 8 *'        # August (preseason), offset after -raw
    - cron: '0 11 * 9-11 *'     # Sept-Nov (regular season)
    - cron: '0 11 1-20 12 *'    # early-mid December
    - cron: '0 11 1-20 1 *'     # early January (bowls + CFP)
  repository_dispatch:
    types: [daily_cfb_data]
  workflow_dispatch:
    inputs:
      start_year:
        description: 'Start year'
        required: false
        type: string
      end_year:
        description: 'End year'
        required: false
        type: string

permissions:
  contents: write

jobs:
  update_cfb_data:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.SDV_GH_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      START_YEAR: ${{ inputs.start_year }}
      END_YEAR: ${{ inputs.end_year }}
    steps:
      - uses: actions/checkout@v5

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          # Bumped 1 -> 2 to discard the stale lockfile that built local::.
          cache-version: 2
          # Do NOT add `local::.`. cfbfastR.cfb.data is a dependency manifest only --
          # its R/ holds standalone creation scripts (run via Rscript, sourcing
          # R/_data_utils.R directly), not loadable package code, so building the
          # package fails lazy-load. The default `packages: deps::.` still installs
          # the DESCRIPTION Imports; nothing does library(cfbfastR.cfb.data).
          extra-packages: |
            sportsdataverse/cfbfastR
            ropensci/piggyback

      # Python builders (cfb_data_build) own the per-game reshape datasets;
      # R above is retained only for team_summaries (espn_cfb_15) + run_summary.
      - name: Set up uv + Python
        uses: astral-sh/setup-uv@v6
        with:
          python-version: '3.12'

      - name: Install Python deps
        working-directory: python
        run: uv sync

      - name: Extract years from repository_dispatch
        if: ${{ github.event.client_payload.event_name == 'daily_cfb_data' }}
        env:
          COMMIT_MESSAGE: ${{ github.event.client_payload.commit_message }}
        run: |
          start=$(printf '%s' "$COMMIT_MESSAGE" | grep -oP 'Start:\s*\K[0-9]{4}' | head -1)
          end=$(printf '%s' "$COMMIT_MESSAGE"   | grep -oP 'End:\s*\K[0-9]{4}'   | head -1)
          echo "START_YEAR=$start" >> $GITHUB_ENV
          echo "END_YEAR=$end"     >> $GITHUB_ENV

      - name: Default years if empty
        if: ${{ env.START_YEAR == '' }}
        run: |
          YR=$(Rscript -e 'cat(cfbfastR::most_recent_cfb_season())')
          echo "START_YEAR=$YR" >> $GITHUB_ENV
          echo "END_YEAR=$YR"   >> $GITHUB_ENV

      - name: Update CFB Data ${{ env.START_YEAR }}-${{ env.END_YEAR }}
        env:
          GITHUB_PAT: ${{ secrets.SDV_GH_TOKEN }}   # R piggyback (team_summaries)
          GH_TOKEN: ${{ secrets.SDV_GH_TOKEN }}      # gh CLI publish (cfb_data_build)
        run: bash scripts/daily_cfb_processor.sh -s ${{ env.START_YEAR }} -e ${{ env.END_YEAR }}
